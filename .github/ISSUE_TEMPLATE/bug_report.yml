name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: "When I run the crawler with..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: Smallest possible code that demonstrates the issue.
      placeholder: |
        ```javascript
        import { OmniCrawler } from 'omnicrawl';
        const crawler = new OmniCrawler()...
        ```
      render: javascript
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: "The crawler should..."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: "Instead, the crawler..."
    validations:
      required: true
  - type: input
    id: omnicrawl-version
    attributes:
      label: OmniCrawl Version
      description: Output of `npm list omnicrawl`
      placeholder: "1.1.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "v20.11.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste relevant log output (use `LOG_LEVEL=debug` for maximum detail).
      render: shell
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or configuration details.
    validations:
      required: false
