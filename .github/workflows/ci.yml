name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Syntax Check ───────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Syntax Check
        run: |
          find src -name '*.js' -exec node --check {} \;
      - name: Advisory Type Check
        continue-on-error: true
        run: npx -p typescript tsc --noEmit

  # ── Unit Tests ────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - name: Run Tests
        run: npm test
      - name: Run API Tests
        run: npm run test:api

  # ── Docker Build Test ─────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t omnicrawl:test .
      - name: Test Docker Container
        run: |
          docker run -d --name omnicrawl-test -p 8787:8787 omnicrawl:test
          sleep 5
          curl -sf http://localhost:8787/health || docker logs omnicrawl-test
          docker stop omnicrawl-test

  # ── Publish to npm ────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
