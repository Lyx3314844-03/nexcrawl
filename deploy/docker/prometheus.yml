global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'omnicrawl'
    static_configs:
      - targets: ['omnicrawl:9464']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-col:8889']
    scrape_interval: 15s
