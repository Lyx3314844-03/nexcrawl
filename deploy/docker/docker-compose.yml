# OmniCrawl Production Docker Compose
# Usage: docker compose up -d
#
# Services:
#   omnicrawl  - Crawler API (port 3100, /metrics on same port)
#   redis      - Distributed rate limiting & job queue
#   otel-col   - OpenTelemetry Collector (OTLP receiver)
#   prometheus - Metrics scraping & storage
#   grafana    - Dashboard visualization

services:
  # ─── OmniCrawler ─────────────────────────────────────────
  omnicrawl:
    build:
      context: ..
      dockerfile: Dockerfile
    image: omnicrawl/omnicrawl:1.1.0
    restart: unless-stopped
    ports:
      - "3100:3100"    # API + /metrics
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      LOG_JSON: "true"
      OMNICRAWL_CONCURRENCY: "10"
      OMNICRAWL_RPS: "5"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-col:4318
      OTEL_SERVICE_NAME: omnicrawl
    volumes:
      - omnicrawl-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # OmniCrawl exposes both /health and /metrics on the API port.
      test: ["CMD", "node", "-e", "const http = require('http'); const req = http.get('http://localhost:3100/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.setTimeout(3000, () => { req.destroy(); process.exit(1); });"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── OpenTelemetry Collector ─────────────────────────────
  otel-col:
    image: otel/opentelemetry-collector-contrib:0.96.0
    restart: unless-stopped
    ports:
      - "4318:4318"    # OTLP HTTP
      - "4317:4317"    # OTLP gRPC
      - "8889:8889"    # Prometheus exporter
    command: ["--config=/etc/otel-col-config.yaml"]
    volumes:
      - ./otel-col-config.yaml:/etc/otel-col-config.yaml:ro

  # ─── Prometheus ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  # ─── Grafana ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-change-me-before-public-use}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/omnicrawl-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  omnicrawl-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
