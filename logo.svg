<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" width="400" height="440">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Letter gradients - each letter gets unique colors -->
    <linearGradient id="lN" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="le" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="lx" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <linearGradient id="lC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="lr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="la" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="lw" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="ll" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Letter glow filter -->
    <filter id="letterGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bodyGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="eyeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="185"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)"/>

  <!-- Outer rings -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.9"/>
  <circle cx="200" cy="200" r="178" fill="none" stroke="url(#ringGrad)" stroke-width="0.8" opacity="0.4"/>

  <!-- Tick marks -->
  <g opacity="0.6">
    <line x1="200" y1="18"  x2="200" y2="30"  stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="200" y1="370" x2="200" y2="382" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18"  y1="200" x2="30"  y2="200" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="370" y1="200" x2="382" y2="200" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="49"  y1="49"  x2="57"  y2="57"  stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="343" y1="49"  x2="351" y2="57"  stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="49"  y1="351" x2="57"  y2="343" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="343" y1="351" x2="351" y2="343" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Web lines -->
  <g clip-path="url(#circleClip)" opacity="0.25" filter="url(#glow)">
    <line x1="200" y1="200" x2="200" y2="30"  stroke="url(#webGrad)" stroke-width="1"/>
    <line x1="200" y1="200" x2="340" y2="115" stroke="url(#webGrad)" stroke-width="1"/>
    <line x1="200" y1="200" x2="370" y2="200" stroke="url(#webGrad)" stroke-width="1"/>
    <line x1="200" y1="200" x2="340" y2="285" stroke="url(#webGrad)" stroke-width="1"/>
    <line x1="200" y1="200" x2="200" y2="370" stroke="url(#webGrad)" stroke-width="1"/>
    <line x1="200" y1="200" x2="60"  y2="285" stroke="url(#webGrad)" stroke-width="1"/>
    <line x1="200" y1="200" x2="30"  y2="200" stroke="url(#webGrad)" stroke-width="1"/>
    <line x1="200" y1="200" x2="60"  y2="115" stroke="url(#webGrad)" stroke-width="1"/>
    <circle cx="200" cy="200" r="55"  fill="none" stroke="url(#webGrad)" stroke-width="0.8"/>
    <circle cx="200" cy="200" r="95"  fill="none" stroke="url(#webGrad)" stroke-width="0.8"/>
    <circle cx="200" cy="200" r="135" fill="none" stroke="url(#webGrad)" stroke-width="0.8"/>
  </g>

  <!-- Spider legs -->
  <g stroke="#a78bfa" stroke-linecap="round" fill="none" filter="url(#glow)">
    <path d="M 162 175 Q 130 145 95 125 Q 70 112 50 100"  stroke-width="3.5" opacity="0.9"/>
    <path d="M 158 190 Q 120 185 85 175 Q 60 168 35 160"  stroke-width="3.5" opacity="0.9"/>
    <path d="M 158 210 Q 120 215 85 225 Q 60 232 35 240"  stroke-width="3.5" opacity="0.9"/>
    <path d="M 162 225 Q 130 255 95 275 Q 70 288 50 300"  stroke-width="3.5" opacity="0.9"/>
    <path d="M 238 175 Q 270 145 305 125 Q 330 112 350 100" stroke-width="3.5" opacity="0.9"/>
    <path d="M 242 190 Q 280 185 315 175 Q 340 168 365 160" stroke-width="3.5" opacity="0.9"/>
    <path d="M 242 210 Q 280 215 315 225 Q 340 232 365 240" stroke-width="3.5" opacity="0.9"/>
    <path d="M 238 225 Q 270 255 305 275 Q 330 288 350 300" stroke-width="3.5" opacity="0.9"/>
  </g>

  <!-- Leg joints -->
  <g fill="#c4b5fd" opacity="0.7">
    <circle cx="130" cy="145" r="3"/><circle cx="120" cy="185" r="3"/>
    <circle cx="120" cy="215" r="3"/><circle cx="130" cy="255" r="3"/>
    <circle cx="270" cy="145" r="3"/><circle cx="280" cy="185" r="3"/>
    <circle cx="280" cy="215" r="3"/><circle cx="270" cy="255" r="3"/>
  </g>

  <!-- Abdomen -->
  <ellipse cx="200" cy="230" rx="42" ry="52" fill="url(#bodyGrad)" filter="url(#bodyGlow)" opacity="0.95"/>
  <ellipse cx="200" cy="225" rx="18" ry="22" fill="none" stroke="#c4b5fd" stroke-width="1" opacity="0.4"/>
  <ellipse cx="200" cy="225" rx="10" ry="12" fill="#6d28d9" opacity="0.5"/>

  <!-- Cephalothorax -->
  <ellipse cx="200" cy="175" rx="38" ry="42" fill="url(#bodyGrad)" filter="url(#bodyGlow)" opacity="0.98"/>
  <ellipse cx="192" cy="162" rx="14" ry="10" fill="white" opacity="0.12"/>

  <!-- Main eyes -->
  <g filter="url(#eyeGlow)">
    <circle cx="188" cy="168" r="9" fill="url(#eyeGrad)"/>
    <circle cx="212" cy="168" r="9" fill="url(#eyeGrad)"/>
    <circle cx="189" cy="169" r="4" fill="#1a0a3e"/>
    <circle cx="213" cy="169" r="4" fill="#1a0a3e"/>
    <circle cx="186" cy="166" r="2" fill="white" opacity="0.9"/>
    <circle cx="210" cy="166" r="2" fill="white" opacity="0.9"/>
  </g>
  <!-- Secondary eyes -->
  <g opacity="0.85">
    <circle cx="178" cy="158" r="5" fill="#c4b5fd"/>
    <circle cx="222" cy="158" r="5" fill="#c4b5fd"/>
    <circle cx="178" cy="158" r="2.5" fill="#1a0a3e"/>
    <circle cx="222" cy="158" r="2.5" fill="#1a0a3e"/>
  </g>
  <g opacity="0.6">
    <circle cx="170" cy="165" r="3.5" fill="#a78bfa"/>
    <circle cx="230" cy="165" r="3.5" fill="#a78bfa"/>
  </g>

  <!-- Fangs -->
  <g fill="#7c3aed" stroke="#a78bfa" stroke-width="0.8">
    <ellipse cx="193" cy="195" rx="5" ry="8" transform="rotate(-10 193 195)"/>
    <ellipse cx="207" cy="195" rx="5" ry="8" transform="rotate(10 207 195)"/>
  </g>
  <g fill="#c4b5fd">
    <ellipse cx="191" cy="202" rx="2.5" ry="3" transform="rotate(-10 191 202)"/>
    <ellipse cx="209" cy="202" rx="2.5" ry="3" transform="rotate(10 209 202)"/>
  </g>

  <!-- Silk thread -->
  <line x1="200" y1="282" x2="200" y2="370" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>

  <!-- Particles -->
  <g filter="url(#glow)">
    <circle cx="85"  cy="80"  r="4" fill="#06b6d4" opacity="0.8"/>
    <circle cx="315" cy="80"  r="4" fill="#06b6d4" opacity="0.8"/>
    <circle cx="60"  cy="320" r="3" fill="#6366f1" opacity="0.7"/>
    <circle cx="340" cy="320" r="3" fill="#6366f1" opacity="0.7"/>
    <circle cx="50"  cy="200" r="3" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="350" cy="200" r="3" fill="#8b5cf6" opacity="0.6"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- NEXCRAWL — each letter in a different color     -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Underline bar behind text -->
  <rect x="52" y="406" width="296" height="3" rx="1.5"
        fill="url(#ringGrad)" opacity="0.5"/>

  <!-- Letters: N e x C r a w l -->
  <!-- Total 8 chars, centered at x=200, each ~34px wide, total ~272px, start x=64 -->
  <g font-family="'Arial Black', 'Impact', sans-serif" font-weight="900"
     font-size="46" filter="url(#letterGlow)" letter-spacing="2">

    <!-- N — pink -->
    <text x="64"  y="400" fill="url(#lN)">N</text>

    <!-- e — orange -->
    <text x="98"  y="400" fill="url(#le)">e</text>

    <!-- x — yellow -->
    <text x="128" y="400" fill="url(#lx)">x</text>

    <!-- C — green -->
    <text x="162" y="400" fill="url(#lC)">C</text>

    <!-- r — teal -->
    <text x="196" y="400" fill="url(#lr)">r</text>

    <!-- a — cyan -->
    <text x="218" y="400" fill="url(#la)">a</text>

    <!-- w — blue -->
    <text x="248" y="400" fill="url(#lw)">w</text>

    <!-- l — purple -->
    <text x="292" y="400" fill="url(#ll)">l</text>
  </g>

  <!-- Subtle dot separators between N-e-x and C-r-a-w-l -->
  <circle cx="157" cy="390" r="2.5" fill="#6366f1" opacity="0.6"/>

</svg>
