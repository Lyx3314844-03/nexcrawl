<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F1A;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#1E1B4B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E1065;stop-opacity:1" />
    </linearGradient>
    
    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.9" />
      <stop offset="33%" style="stop-color:#8B5CF6;stop-opacity:0.9" />
      <stop offset="66%" style="stop-color:#EC4899;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.9" />
    </linearGradient>
    
    <!-- Spider body gradient - more premium -->
    <radialGradient id="spiderBody" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </radialGradient>
    
    <!-- Spider legs gradient -->
    <linearGradient id="legGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Eye glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#06B6D4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:0" />
    </radialGradient>
    
    <!-- Data node gradients -->
    <radialGradient id="nodeCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#67E8F9;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#06B6D4;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="nodePurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#8B5CF6;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="nodePink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F9A8D4;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#EC4899;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#DB2777;stop-opacity:0" />
    </radialGradient>
    
    <!-- Filters -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    
    <filter id="innerShadow">
      <feOffset dx="0" dy="4"/>
      <feGaussianBlur stdDeviation="8" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.3" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>
  
  <!-- Background circle with shadow -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" filter="url(#shadow)" />
  
  <!-- Inner background gradient -->
  <circle cx="256" cy="256" r="235" fill="none" stroke="url(#ringGrad)" stroke-width="1" opacity="0.2" />
  
  <!-- Outer rotating ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" stroke-dasharray="12 8" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="60s" repeatCount="indefinite" />
  </circle>
  
  <!-- Second ring (counter-rotating) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="6 12" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="360 256 256" to="0 256 256" dur="45s" repeatCount="indefinite" />
  </circle>
  
  <!-- Web network - radial lines with gradient opacity -->
  <g opacity="0.25">
    <line x1="256" y1="56" x2="256" y2="456" stroke="#06B6D4" stroke-width="0.8" />
    <line x1="56" y1="256" x2="456" y2="256" stroke="#8B5CF6" stroke-width="0.8" />
    <line x1="114" y1="114" x2="398" y2="398" stroke="#EC4899" stroke-width="0.8" />
    <line x1="398" y1="114" x2="114" y2="398" stroke="#06B6D4" stroke-width="0.8" />
    <line x1="256" y1="56" x2="398" y2="398" stroke="#8B5CF6" stroke-width="0.5" />
    <line x1="256" y1="56" x2="114" y2="398" stroke="#EC4899" stroke-width="0.5" />
    <line x1="456" y1="256" x2="114" y2="114" stroke="#06B6D4" stroke-width="0.5" />
    <line x1="456" y1="256" x2="398" y2="398" stroke="#8B5CF6" stroke-width="0.5" />
  </g>
  
  <!-- Web network - concentric circles -->
  <g opacity="0.2">
    <circle cx="256" cy="256" r="50" fill="none" stroke="#06B6D4" stroke-width="0.8" />
    <circle cx="256" cy="256" r="80" fill="none" stroke="#8B5CF6" stroke-width="0.8" />
    <circle cx="256" cy="256" r="110" fill="none" stroke="#EC4899" stroke-width="0.8" />
    <circle cx="256" cy="256" r="140" fill="none" stroke="#06B6D4" stroke-width="0.8" />
    <circle cx="256" cy="256" r="170" fill="none" stroke="#8B5CF6" stroke-width="0.8" />
  </g>
  
  <!-- Hexagonal web pattern -->
  <g opacity="0.15" stroke="#8B5CF6" stroke-width="0.5" fill="none">
    <polygon points="256,156 342,206 342,306 256,356 170,306 170,206" />
    <polygon points="256,186 316,221 316,291 256,326 196,291 196,221" />
  </g>
  
  <!-- Data flow particles on outer ring -->
  <g filter="url(#softGlow)">
    <!-- Primary particles -->
    <circle cx="256" cy="56" r="5" fill="url(#nodeCyan)" />
    <circle cx="456" cy="256" r="5" fill="url(#nodePurple)" />
    <circle cx="256" cy="456" r="5" fill="url(#nodePink)" />
    <circle cx="56" cy="256" r="5" fill="url(#nodeCyan)" />
    
    <!-- Secondary particles -->
    <circle cx="397" cy="115" r="4" fill="url(#nodePurple)" />
    <circle cx="397" cy="397" r="4" fill="url(#nodePink)" />
    <circle cx="115" cy="397" r="4" fill="url(#nodeCyan)" />
    <circle cx="115" cy="115" r="4" fill="url(#nodePurple)" />
    
    <!-- Tertiary particles -->
    <circle cx="326" cy="76" r="3" fill="url(#nodeCyan)" />
    <circle cx="436" cy="186" r="3" fill="url(#nodePink)" />
    <circle cx="436" cy="326" r="3" fill="url(#nodePurple)" />
    <circle cx="326" cy="436" r="3" fill="url(#nodeCyan)" />
    <circle cx="186" cy="436" r="3" fill="url(#nodePink)" />
    <circle cx="76" cy="326" r="3" fill="url(#nodePurple)" />
    <circle cx="76" cy="186" r="3" fill="url(#nodeCyan)" />
    <circle cx="186" cy="76" r="3" fill="url(#nodePurple)" />
  </g>
  
  <!-- Connection lines between particles -->
  <g opacity="0.3" stroke-width="1" fill="none">
    <path d="M256 56 L397 115" stroke="#06B6D4" />
    <path d="M397 115 L456 256" stroke="#8B5CF6" />
    <path d="M456 256 L397 397" stroke="#EC4899" />
    <path d="M397 397 L256 456" stroke="#06B6D4" />
    <path d="M256 456 L115 397" stroke="#8B5CF6" />
    <path d="M115 397 L56 256" stroke="#EC4899" />
    <path d="M56 256 L115 115" stroke="#06B6D4" />
    <path d="M115 115 L256 56" stroke="#8B5CF6" />
  </g>
  
  <!-- Central spider icon - refined design -->
  <g filter="url(#mediumGlow)" transform="translate(256, 235)">
    <!-- Spider body - more organic shape -->
    <ellipse cx="0" cy="0" rx="32" ry="38" fill="url(#spiderBody)" filter="url(#innerShadow)" />
    
    <!-- Body highlight -->
    <ellipse cx="-8" cy="-10" rx="12" ry="15" fill="white" opacity="0.15" />
    
    <!-- Spider head - sleeker -->
    <ellipse cx="0" cy="-45" rx="20" ry="16" fill="url(#spiderBody)" />
    
    <!-- Head highlight -->
    <ellipse cx="-6" cy="-48" rx="8" ry="6" fill="white" opacity="0.2" />
    
    <!-- Spider eyes - more intense glow -->
    <circle cx="-9" cy="-47" r="6" fill="url(#eyeGlow)" filter="url(#softGlow)" />
    <circle cx="9" cy="-47" r="6" fill="url(#eyeGlow)" filter="url(#softGlow)" />
    <circle cx="-9" cy="-47" r="3.5" fill="#22D3EE" />
    <circle cx="9" cy="-47" r="3.5" fill="#22D3EE" />
    
    <!-- Eye inner highlight -->
    <circle cx="-10" cy="-48" r="1.5" fill="white" opacity="0.9" />
    <circle cx="8" cy="-48" r="1.5" fill="white" opacity="0.9" />
    
    <!-- Spider legs - left side (more elegant curves) -->
    <path d="M-28 -18 Q-65 -45 -90 -25 Q-95 -20 -92 -15" stroke="url(#legGrad)" stroke-width="5" fill="none" stroke-linecap="round" />
    <path d="M-32 -5 Q-70 -15 -95 5 Q-100 10 -95 15" stroke="url(#legGrad)" stroke-width="5" fill="none" stroke-linecap="round" />
    <path d="M-30 12 Q-65 18 -90 35 Q-95 40 -90 45" stroke="url(#legGrad)" stroke-width="5" fill="none" stroke-linecap="round" />
    <path d="M-24 25 Q-55 42 -75 60 Q-80 65 -75 70" stroke="url(#legGrad)" stroke-width="4.5" fill="none" stroke-linecap="round" />
    
    <!-- Spider legs - right side (mirror) -->
    <path d="M28 -18 Q65 -45 90 -25 Q95 -20 92 -15" stroke="url(#legGrad)" stroke-width="5" fill="none" stroke-linecap="round" />
    <path d="M32 -5 Q70 -15 95 5 Q100 10 95 15" stroke="url(#legGrad)" stroke-width="5" fill="none" stroke-linecap="round" />
    <path d="M30 12 Q65 18 90 35 Q95 40 90 45" stroke="url(#legGrad)" stroke-width="5" fill="none" stroke-linecap="round" />
    <path d="M24 25 Q55 42 75 60 Q80 65 75 70" stroke="url(#legGrad)" stroke-width="4.5" fill="none" stroke-linecap="round" />
    
    <!-- Leg joints - more prominent -->
    <circle cx="-65" cy="-30" r="5" fill="#A78BFA" />
    <circle cx="-72" cy="2" r="5" fill="#A78BFA" />
    <circle cx="-65" cy="28" r="5" fill="#A78BFA" />
    <circle cx="-58" cy="52" r="4" fill="#A78BFA" />
    
    <circle cx="65" cy="-30" r="5" fill="#A78BFA" />
    <circle cx="72" cy="2" r="5" fill="#A78BFA" />
    <circle cx="65" cy="28" r="5" fill="#A78BFA" />
    <circle cx="58" cy="52" r="4" fill="#A78BFA" />
    
    <!-- Joint highlights -->
    <circle cx="-66" cy="-31" r="2" fill="white" opacity="0.5" />
    <circle cx="-73" cy="1" r="2" fill="white" opacity="0.5" />
    <circle cx="64" cy="-31" r="2" fill="white" opacity="0.5" />
    <circle cx="71" cy="1" r="2" fill="white" opacity="0.5" />
    
    <!-- Pedipalps (small front appendages) -->
    <path d="M-12 -58 Q-18 -65 -15 -70" stroke="#A78BFA" stroke-width="3" fill="none" stroke-linecap="round" />
    <path d="M12 -58 Q18 -65 15 -70" stroke="#A78BFA" stroke-width="3" fill="none" stroke-linecap="round" />
  </g>
  
  <!-- Digital data streams from spider - more dynamic -->
  <g filter="url(#softGlow)" opacity="0.7">
    <path d="M256 165 Q256 130 256 95" stroke="#06B6D4" stroke-width="2.5" fill="none" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1s" repeatCount="indefinite" />
    </path>
    <path d="M218 180 Q185 155 155 135" stroke="#8B5CF6" stroke-width="2.5" fill="none" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1.2s" repeatCount="indefinite" />
    </path>
    <path d="M294 180 Q327 155 357 135" stroke="#EC4899" stroke-width="2.5" fill="none" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1.1s" repeatCount="indefinite" />
    </path>
    <path d="M205 225 Q170 225 140 225" stroke="#06B6D4" stroke-width="2.5" fill="none" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="0.9s" repeatCount="indefinite" />
    </path>
    <path d="M307 225 Q342 225 372 225" stroke="#8B5CF6" stroke-width="2.5" fill="none" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1.3s" repeatCount="indefinite" />
    </path>
    <path d="M218 255 Q185 275 160 295" stroke="#EC4899" stroke-width="2" fill="none" stroke-dasharray="5 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="1.4s" repeatCount="indefinite" />
    </path>
    <path d="M294 255 Q327 275 352 295" stroke="#06B6D4" stroke-width="2" fill="none" stroke-dasharray="5 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="1s" repeatCount="indefinite" />
    </path>
  </g>
  
  <!-- Floating data nodes - larger and more vibrant -->
  <g filter="url(#mediumGlow)">
    <!-- Primary nodes -->
    <circle cx="155" cy="135" r="8" fill="url(#nodeCyan)" />
    <circle cx="357" cy="135" r="8" fill="url(#nodePink)" />
    <circle cx="140" cy="225" r="7" fill="url(#nodePurple)" />
    <circle cx="372" cy="225" r="7" fill="url(#nodeCyan)" />
    <circle cx="256" cy="95" r="9" fill="url(#nodePurple)" />
    <circle cx="160" cy="295" r="6" fill="url(#nodePink)" />
    <circle cx="352" cy="295" r="6" fill="url(#nodeCyan)" />
    
    <!-- Node inner glow -->
    <circle cx="155" cy="135" r="4" fill="#67E8F9" opacity="0.8" />
    <circle cx="357" cy="135" r="4" fill="#F9A8D4" opacity="0.8" />
    <circle cx="140" cy="225" r="3.5" fill="#C4B5FD" opacity="0.8" />
    <circle cx="372" cy="225" r="3.5" fill="#67E8F9" opacity="0.8" />
    <circle cx="256" cy="95" r="4.5" fill="#C4B5FD" opacity="0.8" />
  </g>
  
  <!-- Text: NEXCRAWL - refined typography -->
  <text x="256" y="425" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="44" fill="white" text-anchor="middle" font-weight="800" letter-spacing="14" filter="url(#softGlow)">NEXCRAWL</text>
  
  <!-- Subtitle with tagline -->
  <text x="256" y="455" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle" font-weight="500" letter-spacing="8">DATA EXTRACTION ENGINE</text>
</svg>
